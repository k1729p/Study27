<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>
      <h4>Employees</h4>
      <p>Department “{{departmentName}}”</p>
    </mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="mat-elevation-z2">
      <table mat-table class="full-width-table" matSort aria-label="Items">
        <!-- Id Column -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Id</th>
          <td mat-cell *matCellDef="let row">{{row.id}}</td>
        </ng-container>

        <!-- First Name Column -->
        <ng-container matColumnDef="firstName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>First Name</th>
          <td mat-cell *matCellDef="let row">{{row.firstName}}</td>
        </ng-container>

        <!-- Last Name Column -->
        <ng-container matColumnDef="lastName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Last Name</th>
          <td mat-cell *matCellDef="let row">{{row.lastName}}</td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef mat-header>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-button (click)="updateEmployee(row.id)">Update</button>
            <button mat-button (click)="deleteEmployee(row.id)">Delete</button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator #paginator [length]="dataSource.employeeArr.length" [pageIndex]="0" [pageSize]="10"
        [pageSizeOptions]="[5, 10, 20]" aria-label="Select page">
      </mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
<mat-card appearance="outlined">
  <mat-card-actions align="end">
    <button mat-stroked-button (click)="createEmployee()">Create Employee</button>
  </mat-card-actions>
</mat-card>
