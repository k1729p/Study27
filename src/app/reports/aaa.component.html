<div class="grid-container">
  <mat-grid-list cols="2">
    <mat-grid-tile>
      <mat-card class="employee-card" appearance="outlined">
        <mat-card-header>
          <mat-card-title>
            <div class="row align-center-vertically">
              <div class="col department-label">
                Department
              </div>
              <div class="col">
                <mat-form-field appearance="outline">
                  <mat-select>
                    <mat-option>ABC</mat-option>
                  </mat-select>
                </mat-form-field>
            </div>
            </div>
          </mat-card-title>
        </mat-card-header>
        <mat-card-actions>
          <button mat-stroked-button>
            Transfer Selected Employees
          </button>
        </mat-card-actions>
        <mat-card-content>
          <div class="table-container">
            <table mat-table [dataSource]="zzzArr" class="employee-table" aria-label="Items">
              <ng-container matColumnDef="select">
                <th mat-header-cell *matHeaderCellDef>
                  <mat-checkbox [checked]="true"/>
                </th>
                <td mat-cell *matCellDef="let row">
                  <mat-checkbox [checked]="true" />
                </td>
              </ng-container>
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Name</th>
                <td mat-cell *matCellDef="let row">{{row.name}}</td>
              </ng-container>
              <!--
              <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
              <tr mat-row *matRowDef="let row; columns: displayedColumns;" (click)="leftSideSelection.toggle(row)"></tr>
              -->
            </table>
          </div>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>

    <mat-grid-tile [colspan]="1" [rowspan]="1">
      <mat-card class="employee-card" appearance="outlined">
        <mat-card-header>
          <mat-card-title>
            <div class="row align-center-vertically">
              <div class="col department-label">
                Department
              </div>
              <div class="col">
                <mat-form-field appearance="outline">
                  <mat-select>
                    <mat-option>XYZ</mat-option>
                  </mat-select>
                </mat-form-field>
            </div>
            </div>
          </mat-card-title>
        </mat-card-header>
        <mat-card-actions>
          <button mat-stroked-button>
            Transfer Selected Employees
          </button>
        </mat-card-actions>
        <mat-card-content>
          <div class="table-container">
            <table mat-table class="employee-table" aria-label="Items">
              <ng-container matColumnDef="select">
              </ng-container>
              <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Name</th>
                <td mat-cell *matCellDef="let row">a b c</td>
              </ng-container>
            </table>
          </div>
        </mat-card-content>
      </mat-card>
    </mat-grid-tile>
  </mat-grid-list>
</div>
